version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo Installing dependencies...

  pre_build:
    commands:
      - echo Logging in to Docker...
      - docker --version

  build:
    commands:
      - echo Building Docker image...
      - docker build -t myapp .

  post_build:
    commands:
      - echo Running container...
      - docker run -d -p 5000:5000 myapp